services:
  - type: web
    name: ai-assistant-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: FRONTEND_ORIGIN
        value: "*"
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-5

  - type: static
    name: ai-assistant-frontend
    rootDir: frontend
    buildCommand: ""
    staticPublishPath: .
